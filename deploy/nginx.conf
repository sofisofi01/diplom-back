upstream web {
    server web:8000;
}

server {
    listen 80;
    server_name zavyalova.h1n.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name zavyalova.h1n.ru;

    ssl_certificate /etc/letsencrypt/live/zavyalova.h1n.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zavyalova.h1n.ru/privkey.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
